            function loadPageState() {
                setMaxWidth();

                document.querySelectorAll('.tab-container').forEach((container, containerIndex) => {
                    const tabs = container.querySelectorAll('.tab');
                    const storageKey = `activeTab_${containerIndex}_${pageName}`;

                    let defaultTabId = localStorage.getItem(storageKey);
                    if (!defaultTabId) {
                        const activeTab = container.querySelector('.tab.active');
                        defaultTabId = activeTab ? activeTab.getAttribute('for') : tabs[0].getAttribute('for');
                    }

                    tabs.forEach(tab => {
                        const tabFor = tab.getAttribute('for');
                        tab.classList.toggle('active', tabFor === defaultTabId);
                    });

                    container.querySelectorAll('.content-section').forEach(section => {
                        section.style.display = (section.id === defaultTabId) ? 'flex' : 'none';
                    });

                    tabs.forEach(tab => {
                        tab.onclick = () => {
                            tabs.forEach(t => t.classList.remove('active'));
                            tab.classList.add('active');

                            const targetId = tab.getAttribute('for');
                            container.querySelectorAll('.content-section').forEach(section => {
                                section.style.display = (section.id === targetId) ? 'flex' : 'none';
                            });

                            localStorage.setItem(storageKey, targetId);
                        };
                    });
                });

                const pageData = localStorage.getItem(pageName) || null;
                if (pageData) {
                    const state = JSON.parse(pageData || '{}') || {};

                    // Restore checkboxes
                    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                        const id = cb.id;
                        if (!id) return;
                        cb.checked = state[id] || false;
                        cb.dispatchEvent(new Event('change', { bubbles: true }));
                    });

                    // Restore text inputs
                    document.querySelectorAll('input[type="text"], textarea').forEach(inp => {
                        const id = inp.id;
                        if (!id) return;
                        inp.value = state[id] || '';
                        inp.dispatchEvent(new Event('input', { bubbles: true }));
                    });

                    if (state.selectedRectangles) {
                        state.selectedRectangles.forEach(selectedId => {
                            const rectangle = document.getElementById(selectedId);
                            if (rectangle) rectangle.classList.add('selected');
                        });
                    }

                    const rectangleQuery = document.querySelectorAll('.rectangle');
                    rectangleQuery.forEach((rectangle, id) => {
                        const btnText = rectangle.querySelector('h4');
                        const items = rectangle.querySelectorAll('.item');

                        if (state.rectangles && state.rectangles[id]) {
                            if (btnText) btnText.innerText = state.rectangles[id].text || '';

                            if (state.rectangles[id].open) {
                                rectangle.classList.add('open');
                                const listItems = rectangle.querySelector('.list-items');
                                if (listItems) listItems.style.display = 'flex';

                                    if (checkbox) {

                            });
                        }

                    // Restore active navigation

                            link.classList.add('active');
                            const targetSection = document.getElementById(link.getAttribute('for'));
                            if (targetSection) targetSection.style.display = 'flex';
                        }

                    // Restore multiboxes
                    const multiboxQuery = document.querySelectorAll('.multibox');

                        const MAX_SEG_DURATION = 5;
                        const timestampEnabled = localStorage.getItem('positivePrompt_timestampMode') === '1';
                        function normalizePromptText(text) {
                            if (!text) return '';

                            // Remove emojis
                            text = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '');

                            const lines = text
                                .replace(/\r\n/g, '\n')
                                .split('\n')
                                .map(l => l.replace(/\s+/g, ' ').trim())
                                .filter(Boolean);

                            const out = [];

                            for (const line of lines) {
                                // If this is a timestamp line, never merge
                                if (/^\d+(\.\d+)?-\d+(\.\d+)?\s*\{.*\}$/.test(line)) {
                                    out.push(line);
                                    continue;
                                }

                                // Otherwise merge broken sentences
                                if (out.length && !/[.!?}]$/.test(out[out.length - 1])) {
                                    out[out.length - 1] += ' ' + line;
                                } else {
                                    out.push(line);
                                }
                            }

                            // Capitalize sentences (inside lines only)
                            return out
                                .map(l =>
                                    l.replace(/(^|[.!?]\s+)([a-z])/g, (m, p1, p2) => p1 + p2.toUpperCase())
                                )
                                .join('\n');
                        }

                        let writtenPrompt = timestampEnabled

                        console.log("writtenPrompt before: " + writtenPrompt);
                        writtenPrompt = normalizePromptText(writtenPrompt);
                        console.log("writtenPrompt after: " + writtenPrompt);
                        let positivePrompt;

                        const lines = (writtenPrompt || '')
                            .split('\n')
                            .map(l => l.trim())
                            .filter(Boolean);

                        // parse into prompt objects { start, end, action }
                        const prompts = lines.map(line => {
                            const [mainPart] = line.split('|');
                            const bracketIndex = mainPart.indexOf('{');
                            if (bracketIndex === -1) return null;

                            const timesStr = mainPart.slice(0, bracketIndex).trim();
                            const actionStr = mainPart.slice(bracketIndex + 1, mainPart.indexOf('}', bracketIndex)).trim();

                            const [startStr, endStr] = timesStr.split('-').map(s => s && s.trim());
                            const start = parseFloat(startStr);
                            const end = parseFloat(endStr);

                            if (Number.isNaN(start) || Number.isNaN(end) || end <= start) return null;

                            return { start, end, action: actionStr };

                            // if duration is small, keep original raw text (no auto-timestamps)
                            if (duration <= MAX_SEG_DURATION) {
                                positivePrompt = writtenPrompt;
                            } else {
                                // build slots from 0..duration in MAX_SEG_DURATION steps
                                const slotCount = Math.ceil(duration / MAX_SEG_DURATION);

                                // lines are the raw (untimestamped) prompt lines we parsed earlier
                                // assign actions sequentially to slots, repeating the last one if needed
                                for (let i = 0; i < slotCount; i++) {
                                    const slotStart = parseFloat((i * MAX_SEG_DURATION).toFixed(2));
                                    const slotEnd = parseFloat(Math.min((i + 1) * MAX_SEG_DURATION, duration).toFixed(2));

                                    // choose action: line i if exists, otherwise last line
                                    const action = lines[i] || lines[lines.length - 1] || '';

                                    // ensure we have a non-empty action; if empty, skip (shouldn't normally happen)
                                    if (!action) continue;

                                    slots.push(`${slotStart.toFixed(2)}-${slotEnd.toFixed(2)}{${action}}`);
                                }

                                positivePrompt = slots.join('\n');
                            }

                            // determine overall timeline
                            const minStart = Math.min(...prompts.map(p => p.start));
                            const maxEnd = Math.max(...prompts.map(p => p.end));
                            const totalDuration = maxEnd - minStart;
                            const slotCount = Math.ceil(totalDuration / MAX_SEG_DURATION);

                            // sort prompts by start (useful for fallback logic)
                            prompts.sort((a, b) => a.start - b.start);

                            const slots = [];
                            for (let i = 0; i < slotCount; i++) {
                                const slotStart = +(minStart + i * MAX_SEG_DURATION).toFixed(2);
                                const slotEnd = +Math.min(minStart + (i + 1) * MAX_SEG_DURATION, maxEnd).toFixed(2);

                                let best = null;
                                let bestOverlap = -1;
                                for (const p of prompts) {
                                    const overlap = Math.max(0, Math.min(slotEnd, p.end) - Math.max(slotStart, p.start));
                                    if (overlap > bestOverlap) {
                                        bestOverlap = overlap;
                                        best = p;
                                    } else if (overlap === bestOverlap && overlap > 0) {
                                        // tie on overlap -> prefer the prompt that STARTS LATER
                                        if (p.start > best.start) best = p;
                                    }
                                }

                                // If nothing overlaps (bestOverlap === 0) prefer the first prompt that starts at or after the slot,
                                // otherwise fall back to the last prompt.
                                if (!best || bestOverlap === 0) {
                                    const future = prompts.find(p => p.start >= slotStart);

                        let interpolation = 1;

                        if (fps > 16 && fps <= 32) {
                            interpolation = 2;
                        } else if (fps > 32) {
                            interpolation = 4;
                        }

                        function getTotalDurationFromPrompt(text) {
                            if (!text) return 0;

                            const regex = /(\d+(?:\.\d+)?)\s*-\s*(\d+(?:\.\d+)?)/g;
                            let maxEnd = 0;
                            let match;

                            while ((match = regex.exec(text)) !== null) {
                                const end = parseFloat(match[2]);
                                if (Number.isFinite(end) && end > maxEnd) {
                                    maxEnd = end;
                                }
                            }

                            return maxEnd;
                        }

                        const durationFromPrompt = Number(getTotalDurationFromPrompt(positivePrompt));
                        if (durationFromPrompt)
                            duration = durationFromPrompt;

                        let neededCredits = 1;
                        neededCredits *= Number(duration);
                        neededCredits *= 1 + (Number(quality) - 1) * 0.5;

                        if (removeBanner) neededCredits *= 2;

                        neededCredits /= 2;
                        neededCredits = Math.max(1, Math.round(neededCredits));

                        async function getServerAddresses() {
                            try {
                                const snapshotPromise = () => getDocsSnapshot('servers');
                                const keepSlowServers = true;

                                let addresses = await fetchServerAddresses(snapshotPromise, keepSlowServers, null, true);

                        let startFrameFile = 'null';

                            function sanitizeFilenamePart(str) {

                            const userName = sanitizeFilenamePart(userDoc.username);
                            const timestampStr = sanitizeFilenamePart(timestamp);
                            const idStr = sanitizeFilenamePart(id);
                            startFrameFileName = `${userName}_${neededCredits}_${timestampStr}_${idStr}_start_frame_1.png`;
                            startFrameFile = await processDataToFile(activePhotoInput.src, startFrameFileName);

                            if (!startFrameFile) {
                                handleProcessBtn.disabled = false;
                                setClientStatus(`Blob to file failed. Retrying...`);
                                showNotification(`Failed to create files. Trying again automatically...`, 'Warning - Process Failed', 'warning-important');

                                if (!window._blobRetryDoneStart) {
                                    window._blobRetryDoneStart = true;

                                        setTimeout(() => {

                                            handleProcessBtn.click();

                                } else {
                                    location.reload(true); 
                                }
                                return;
                            }

                            const MAX_FILE_SIZE_MB = 50;

                            if (startFrameFile.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
                                handleProcessBtn.disabled = false;
                                setClientStatus(`Size exceeds ${MAX_FILE_SIZE_MB}MB limit`);
                                showNotification(`Size exceeds ${MAX_FILE_SIZE_MB}MB limit`, 'Process - Information', 'warning-important');

                        let lastFrameFile = 'null';
                        let lastFrameFileName = -1;

                        const activeLastFrameInput = document.querySelector(".last-frames .data-container.active")?.querySelector('[original="true"]');
                        if (activeLastFrameInput) {
                            const timestamp = activeLastFrameInput?.getAttribute('timestamp');
                            const id = activeLastFrameInput?.getAttribute('id');

                            if (!timestamp || !id) {
                                setClientStatus(`Timestamp or id is missing.`);
                                showNotification(`Timestamp or id is missing. Cannot create input file name. Please contact an administrator.`, 'Warning - Process Failed', 'warning-important');
                                return;
                            }

                            function sanitizeFilenamePart(str) {
                                return String(str).replace(/[^a-zA-Z0-9_-]/g, '');
                            }

                            const userName = sanitizeFilenamePart(userDoc.username);
                            const timestampStr = sanitizeFilenamePart(timestamp);

                            lastFrameFileName = `${userName}_${neededCredits}_${timestampStr}_${idStr}_last_frame_1.png`;

                            const MAX_FILE_SIZE_MB = 50;

                            if (lastFrameFile.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
                                handleProcessBtn.disabled = false;
                                setClientStatus(`Blob to file failed. Retrying...`);
                                showNotification(`Failed to create files. Trying again automatically...`, 'Warning - Process Failed', 'warning-important');

                                if (!window._blobRetryDone) {

                                    if (activeContainer) {
                                        activeContainer.click();

                                    location.reload(true);
                                }

                        if (lastFrameFile !== 'null' && startFrameFile === 'null')
                            startFrameFile = lastFrameFile;

                        let userInternetProtocol, userUniqueBrowserId, serverAddresses;

                        const timeoutDuration = 15000;
                        let remainingTime = timeoutDuration / 1000;

                        const countdownInterval = setInterval(() => {
                            setClientStatus(`Creating ID... ${remainingTime}`);

                        const timeout = new Promise((_, reject) =>

                        try {

                        if (!cannotBeBanned(userDoc)) {
                            const proxyNotifications = {
                                isTOR: {

                                }

                            for (const [key, { message, title, type }] of Object.entries(proxyNotifications)) {
                                if (userInternetProtocol[key]) {
                                    showNotification(message, title, type);
                                }
                            }
                        }

                        if (!serverAddresses || !Array.isArray(serverAddresses)) {
                            setClientStatus("No server addresses found.");
                            showNotification(
                                "Could not retrieve server addresses. Please check your network connection or try again later.",
                                "Warning - Process Failed",
                                "warning-important"
                            );
                            handleProcessBtn.disabled = false;
                            return;
                        }

                        const serverId = serverID().toLowerCase();
                        const parsedServers = serverAddresses.map(addr => {
                            const host = addr.replace(/-pro(?=-|\.|$)/gi, '');
                            const regex = new RegExp(`https:\\/\\/([^/]+)-([0-9]+)-${serverId}\\.deepany\\.top`, "i");
                            const match = host.match(regex);

                            if (!match) {
                                return { addr, major: 0, minor: 0, index: Infinity, suffix: "", gpuNumber: 0, hostRank: 0 };
                            }

                            const fullLeft = match[1];
                            const index = parseInt(match[2], 10);
                            const parts = fullLeft.split('-').map(p => p.toLowerCase());
                            const numericTokens = parts.filter(p => /^\d+$/.test(p)).map(n => parseInt(n, 10));
                            const gpuNumber = numericTokens.length ? numericTokens[numericTokens.length - 1] : 0;
                            const hostRank = numericTokens.length > 0 ? numericTokens[0] : 0;

                            let suffix = "";
                            for (let i = parts.length - 1; i >= 0; i--) {
                                if (!/^\d+$/.test(parts[i])) { suffix = parts[i]; break; }
                            }

                            const major = Math.floor(gpuNumber / 100);
                            const minor = gpuNumber % 100;

                            return { addr, major, minor, index, suffix, gpuNumber, hostRank };
                        });

                        // Sort: index asc -> gpu major desc -> gpu minor desc -> hostRank desc -> suffix desc
                        parsedServers.sort((a, b) => {
                            if (a.index !== b.index) return a.index - b.index;            // prefer lower index (same queue consideration)
                            if (a.major !== b.major) return b.major - a.major;           // prefer bigger GPU major
                            if (a.minor !== b.minor) return b.minor - a.minor;           // prefer bigger GPU minor
                            return b.hostRank - a.hostRank;
                        });

                        // build helper map by addr for grouping lookups later
                        const parsedByAddr = {};
                        parsedServers.forEach(p => parsedByAddr[p.addr.toLowerCase()] = p);

                        let sortedServerAddresses = parsedServers.map(p => p.addr.toLowerCase());
                        let serverQueueResults = await Promise.all(
                            sortedServerAddresses.map(server => checkServerQueue(server))
                        );

                        const isolatedServers = new Set([
                            "https://rtl-7-pro-6000-1-dv.deepany.top",
                            "https://rtl-3-5090-1-dv.deepany.top",
                        ].map(s => s.toLowerCase()));

                        const adjustQueue = (server) => {
                            if (!hasSubscriptionPlan(userDoc) && isolatedServers.has(server))
                                return Infinity;

                            return serverQueueResults[sortedServerAddresses.indexOf(server)];
                        };

                        const adjustedQueues = sortedServerAddresses.map(server => adjustQueue(server));
                        const minQueueIndex = adjustedQueues.reduce((minIndex, queue, id, arr) =>
                            queue < arr[minIndex] ? id : minIndex,
                            0
                        );

                        if (adjustedQueues[minQueueIndex] === Infinity) {
                            handleProcessBtn.disabled = false;
                            setClientStatus("Offline");
                            showNotification(
                                `Cannot fetch the server. A VPN could cause this or our server is currently offline. Contact an admin for more information.`,
                                "Warning - Process Failed",
                                "warning-important"
                            );
                            return;
                        }

                        const userName = userDoc.username.replace(/[^a-zA-Z0-9_]/g, '');
                        const fileOutputId = `${Math.random().toString(36).substring(2, 15)}_${userName}_${neededCredits}_${0}`;

                        setFetchableServerAdresses([sortedServerAddresses[minQueueIndex]]);
                        const serverAddress = getFetchableServerAdresses()[0];
                        setFetchableServerAdresses([serverAddress]);
                        setClientStatus(`Connecting`);
                        showNotification(`Connecting to ${serverAddress}...`, "Process - Information", "information");

                        const serverUrl = new URL(serverAddress);
                        const onlineStatus = localStorage.getItem(`onlineStatus_${serverUrl.origin}`);

                        const userToken = localStorage.getItem('userToken');
                        if (userToken === 'null') {
                            showNotification(
                                `Authentication token expired, please login again to confirm ownership of the account.`,
                                'Authentication',
                                'information'
                            );

                            await handleLoggedOutState(null, getFirebaseModules);

                            const openSignInContainer = document.getElementById('openSignInContainer');
                            if (openSignInContainer) {
                                openSignInContainer.style.display = 'block';
                                openSignInContainer.click();
                            }

                            localStorage.setItem('userToken', null);
                            handleProcessBtn.disabled = true;
                            return;
                        }

                        const formData = new FormData();
                        formData.append('startFrameFile', startFrameFile);
                        formData.append('lastFrameFile', lastFrameFile);
                        formData.append('processToken', userToken);
                        formData.append('userId', userData.uid);
                        formData.append('onlineStatus', onlineStatus);
                        formData.append('og', localStorage.getItem('og') || false);
                        formData.append('userInternetProtocolAddress', userInternetProtocol?.userInternetProtocolAddress);
                        formData.append('userUniqueInternetProtocolId', userInternetProtocol?.userUniqueInternetProtocolId);
                        formData.append('userUniqueBrowserId', userUniqueBrowserId);
                        formData.append('fileOutputId', fileOutputId);
                        formData.append('generateAudio', generateAudio);
                        formData.append('losslessEncoder', losslessEncoder);
                        formData.append('randomizeSeed', randomizeSeed);
                        formData.append('positiveAudioPrompt', positiveAudioPrompt);
                        formData.append('negativeAudioPrompt', negativeAudioPrompt);
                        formData.append('positivePrompt', positivePrompt);
                        formData.append('negativePrompt', negativePrompt);
                        formData.append('language', language);
                        formData.append('priority', priority);
                        formData.append('model', model);
                        formData.append('resolution', resolution);
                        formData.append('quality', quality);
                        formData.append('duration', duration);
                        formData.append('aspectRatio', aspectRatio);
                        formData.append('changeAspectRatio', changeAspectRatio);
                        formData.append('sageAttention', sageAttention);
                        formData.append('fps', fps);
                        formData.append('clipSkip', clipSkip);
                        formData.append('shift', shift);
                        formData.append('scheduler', scheduler);
                        formData.append('sampler', sampler);
                        formData.append('nag', nag);
                        formData.append('moe', moe);
                        formData.append('motion', (motionBox?.querySelector('input[type="range"]')?.value * 5) || 0);
                        formData.append('anchorSample', anchorSample);
                        formData.append('fp16Latent', fp16Latent);
                        formData.append('dynamicLatent', dynamicLatent);
                        formData.append('increaseSamplerSeeds', increaseSamplerSeeds);
                        formData.append('disableSamplerNoise', disableSamplerNoise);
                        formData.append('advancedClip', advancedClip);
                        formData.append('structural_repulsion_boost', (structural_repulsion_boost?.querySelector('input[type="range"]')?.value) || 0);
                        formData.append('colorDriftCorrection', (colorDriftCorrection?.querySelector('input[type="range"]')?.value) || 0);
                        formData.append('torchCompiler', 'true');
                        formData.append('torchAccumulation', 'true');
                        formData.append('clear', 'true');
                        formData.append('interpolation', interpolation);
                        formData.append('removeBanner', removeBanner);
                        formData.append('emailOutput', false);

                        showNotification(`Sending your configuration to the server...`, 'Upload', 'information');
                        setClientStatus('Configurating...');

                        const response = await fetchWithRandom(`${serverAddress}/start-process`, {
                            method: 'POST',
                            body: formData
                        });

                        if (response.status !== STATUS_OK) {
                            const data = await response.json();
                            console.error(data.server);
                            throw new Error(data.server);
                        }

                        const result = await response.json();
                        showNotification(`Creating output database using IndexedDB...`, 'Database - IndexedDB', 'information');

                        const db = await openDB(`outputDB-${pageName}`, 'outputs');
                        const url = serverAddress + '/download-output/' + fileOutputId;
                        const firstChild = outputs.firstChild;

                        if (firstChild && !firstChild.dataset.created) {
                            firstChild.dataset.created = true;
                            firstChild.innerHTML = `<div class="process-text">Indexing</div>`;

                            function formDataToObject(formData) {
                                const obj = {};
                                const excludeKeys = new Set([
                                    'userId',
                                    'userInternetProtocolAddress',
                                    'userUniqueBrowserId',
                                    'userUniqueInternetProtocolId',
                                    'fileOutputId',
                                    'startFrameFile',
                                    'lastFrameFile',
                                    'onlineStatus',
                                    'processToken'
                                ]);

                                formData.append('startFrameFileName', startFrameFileName);
                                formData.append('lastFrameFileName', lastFrameFileName);

                                for (const [key, value] of formData.entries()) {
                                    if (!(value instanceof File) && !excludeKeys.has(key)) {
                                        obj[key] = value;
                                    }
                                }
                                return obj;
                            }

                            const formDataObject = formDataToObject(formData);
                            localStorage.setItem(`${url}_formData`, JSON.stringify(formDataObject));

                            await addToDB(db, [null, url], false);
                            await saveCountIndex(databases);

                            const data = await getFromDB(db);
                            const entry = data.find(item => item.url && item.url.toLowerCase() === url.toLowerCase());
                            firstChild.innerHTML = `<initial url="${entry.url}" id="${entry.id}" timestamp="${entry.timestamp}" processing></initial><div class="process-text">Indexing</div><div class="delete-icon"></div>`;
                        }

                        showNotification(`Starting the process...`, 'Upload', 'information');
                        setClientStatus('Starting...');
                        updateDownloadFile(true, databases, userData.uid);
                        return result;
                    } catch (error) {
                        console.error(error.message);
                        handleProcessBtn.disabled = false;
                        setClientStatus(error.message);
                        cancelProcess(false);
                    }
                }

                if (handleProcessBtn)
                    handleProcessBtn.addEventListener('click', async () => {
                        await handleProcess();
                    });

                const downloadOutput = document.getElementById('downloadOutput');
                if (downloadOutput) {
                    const activeDataContainer = document.querySelector(".outputs .data-container.active");
                    downloadOutput.disabled = !!activeDataContainer;
                    //showNotification(`Maintaince for IOS downloads (Not important if you are not IOS).`, 'Warning - Download', 'warning');

                    downloadOutput.addEventListener('click', async () => {
                        const activeDataContainer = document.querySelector(".outputs .data-container.active");
                        if (!activeDataContainer) {
                            showNotification(`No active output container selected.`, 'Warning - Download', 'warning');
                            return;
                        }

                        const activeInput = activeDataContainer?.querySelector('[original="true"]');
                        if (!activeInput) {
                            showNotification(`No active input element found.`, 'Warning - Download', 'warning');
                            return;
                        }

                        if (downloadOutput.textContent === "Pause") {
                            const abortController = getAbortController();
                            if (abortController) {
                                abortController.abort();
                                resetAbortController();
                                setDownloadCancelled(true);
                                showNotification(`Download paused successfully.`, 'Download - Paused', 'info');
                            } else {
                                showNotification(`No active download to pause.`, 'Warning - Pause', 'warning');
                            }

                            downloadOutput.textContent = "Resume";
                            downloadOutput.classList.add("important");
                            return;
                        }

                        if (downloadOutput.textContent === "Resume") {
                            const selectedOutputInfo = {
                                db: await openDB(`outputDB-${pageName}`, 'outputs'),
                                url: activeInput.getAttribute('url'),
                                timestamp: parseInt(activeInput.getAttribute('timestamp')),
                                element: activeInput.parentElement,
                                id: parseInt(activeInput.getAttribute('id')),
                                active: activeInput.getAttribute('active'),
                            };

                            showNotification(`Resuming download for output ID: ${selectedOutputInfo.id}.`, 'Download - Resuming', 'info');
                            return await handleDownload(selectedOutputInfo);
                        }

                        console.log(activeInput);
                        if (activeInput) {
                            const id = activeInput.getAttribute('id');
                            const fileName = 'output_' + `${id}.${activeInput.tagName === 'VIDEO' ? 'mp4' : 'png'}`;

                            const domIndex = parseInt(activeInput.getAttribute('id'));
                            const db = await openDB(`outputDB-${pageName}`, 'outputs');
                            const items = await getFromDB(db);
                            const item = items.find(item => item.id === domIndex);
                            if (!item || !item.blob) {
                                throw new Error(`No blob found for ID: ${domIndex}`);
                            }

                            let type = '';
                            if (activeInput) {
                                if (activeInput.tagName === 'IMG') {
                                    type = 'image/png';
                                } else if (activeInput.tagName === 'VIDEO') {
                                    type = 'video/mp4';
                                } else {
                                    showNotification('Error: Unsupported element type for download.', 'Error - Download', 'error');
                                    return;
                                }
                            }
                            let methodUsed = 0;
                            try {
                                if (window.showSaveFilePicker) {
                                    methodUsed = 1;
                                    showNotification('Attempting to use showSaveFilePicker...', 'Download - Info', 'info');

                                    const fileHandle = await window.showSaveFilePicker({
                                        suggestedName: fileName,
                                        types: [
                                            { description: 'Video Files', accept: { 'video/mp4': ['.mp4'], 'video/webm': ['.webm'] } },
                                            { description: 'Image Files', accept: { 'image/png': ['.png'], 'image/jpeg': ['.jpg'] } },
                                        ],
                                    });

                                    const writableStream = await fileHandle.createWritable();
                                    await writableStream.write(item.blob);
                                    await writableStream.close();
                                    showNotification(`File saved successfully: ${fileName}`, 'Download - Success', 'success');
                                } else if (navigator.share) {
                                    methodUsed = 2;
                                    showNotification('Attempting to use navigator.share...', 'Download - Info', 'info');

                                    const fileToShare = new File([item.blob], fileName, { type });
                                    await navigator.share({ title: fileName, files: [fileToShare] });
                                    showNotification(`File shared successfully: ${fileName}`, 'Download - Shared', 'success');
                                } else {
                                    methodUsed = 3;
                                    showNotification('Attempting to use <a> tag for download...', 'Download - Info', 'info');

                                    const objectURL = URL.createObjectURL(item.blob);
                                    const a = document.createElement('a');
                                    a.href = objectURL;
                                    a.download = fileName;
                                    document.body.appendChild(a);
                                    a.click();
                                    document.body.removeChild(a);
                                    URL.revokeObjectURL(objectURL);
                                    showNotification(`File downloaded successfully: ${fileName}`, 'Download - Success', 'success');
                                }
                            } catch (error) {
                                if (error.name === 'AbortError') {
                                    showNotification(`Download was aborted for: ${fileName}`, 'Error - Aborted', 'error');
                                    return;
                                }

                                showNotification(`First method failed (Error: ${error.message} - Method: ${methodUsed}), retrying in 1000ms for file: ${fileName}...`, 'Error - Download', 'error');
                                setTimeout(() => {
                                    const objectURL = URL.createObjectURL(item.blob);
                                    const a = document.createElement('a');
                                    a.href = objectURL;
                                    a.download = fileName;

                                    if (!iosMobileCheck()) {  // Only execute this on non-iOS devices
                                        try {
                                            document.body.appendChild(a);
                                            a.click();
                                            document.body.removeChild(a);
                                            URL.revokeObjectURL(objectURL);
                                            showNotification(`File downloaded successfully: ${fileName}`, 'Download - Success', 'success');
                                        } catch (error) {
                                            showNotification(`Failed to download the file (Error: ${error.message})`, 'Error - Download', 'error');
                                        }
                                    } else {
                                        showNotification(`Skipping download method for iOS devices: ${fileName}`, 'Download - Info', 'info');
                                        try {
                                            const newTab = window.open(objectURL, '_blank');
                                            if (!newTab) {
                                                showNotification(`Failed to open the file in a new tab for: ${fileName}`, 'Error - Open Tab', 'error');
                                            } else {
                                                setTimeout(() => {
                                                    URL.revokeObjectURL(objectURL);
                                                }, 1000);
                                            }
                                        } catch (tabError) {
                                            showNotification(`Failed to open in a new tab (Error: ${tabError.message})`, 'Error - Tab Open', 'error');
                                        }
                                    }
                                }, 1000);
                            }
                        } else {
                            showNotification(`No output is selected.`, 'Warning - Download', 'warning');
                        }
                    });
                }

                const viewOutput = document.getElementById('viewOutput');
                if (viewOutput) {
                    const activeDataContainer = document.querySelector(".outputs .data-container.active");
                    viewOutput.disabled = !!activeDataContainer;
                    viewOutput.addEventListener('click', async () => {
                        const activeDataContainer = document.querySelector(".outputs .data-container.active");
                        const activeInput = activeDataContainer?.querySelector('[original="true"]');

                        if (activeInput) {
                            if (viewOutput.textContent === 'Fetch') {

                        icon.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>`;
                        icon.style.flex = '0 0 auto';
                        icon.style.display = 'flex';
                        icon.style.height = '3vh';
                        icon.style.alignItems = 'center';

                        const txt = document.createElement('div');
                        txt.className = 'pp-text';
                        txt.textContent = short(s.action, 128);

                        const time = document.createElement('div');
                        time.className = 'pp-time';
                        time.textContent = `${secs(s.start)} → ${secs(s.end)}`;

                        const del = document.createElement('button');
                        del.type = 'button';
                        del.className = 'pp-delete';
                        del.setAttribute('aria-label', 'Delete prompt');
                        del.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>`;

                        c.addEventListener('click', (ev) => {
                            if (ev.target.closest('.pp-delete')) return;
                            ev.preventDefault();
                            ev.stopPropagation();
                            startEdit(i);
                        });

                        c.addEventListener('touchend', (ev) => {
                            if (ev.target.closest('.pp-delete')) return;
                            ev.preventDefault();
                            startEdit(i);
                        });

                        del.addEventListener('click', (ev) => {
                            ev.stopPropagation();
                            deletePrompt(i);
                        });

                        c.append(icon, txt, time, del);
                        chipsRow.appendChild(c);
                    });

                    const add = document.createElement('div');
                    add.className = 'pp-chip add';
                    const maxReached = segs.length >= maxPrompts;
                    add.classList.toggle('disabled', maxReached);
                    add.innerHTML = maxReached
                        ? `<div class="low-opacity-75">🚫</div><div class="pp-text low-opacity-75">Reached maximum</div>`
                        : `<div class="low-opacity-75">⌨</div><div class="pp-text low-opacity-75">Add prompt</div>`;

                    add.addEventListener('touchend', (e) => {
                        if (maxReached) return;
                        e.preventDefault();
                        startAdd();
                    });
                    add.onclick = maxReached ? null : (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        startAdd();
                    };
                    chipsRow.appendChild(add);
                };

                const showWriter = () => {
                    writeBuffer = '';
                    t.value = '';
                    chipsRow.innerHTML = `<div class="pp-writing">Writing prompt ${segs.length + 1}: <span class="pp-live"></span></div>`;
                    t.classList.add('pp-hidden-text');
                    t.readOnly = false;
                    t.disabled = false;
                    t.setAttribute('spellcheck', 'false');
                    t.autocorrect = 'off';
                    t.autocapitalize = 'off';
                    requestAnimationFrame(() => {
                        t.focus();
                        t.click();
                        t.setSelectionRange(0, 0);
                    });
                    t.focus();
                    t.setSelectionRange(0, 0);
                    setTimeout(() => { t.focus(); t.setSelectionRange(0, 0); }, 100);
                    updateLive();
                };

                const showEditor = (i) => {
                    if (i == null || i < 0 || i >= segs.length) return;
                    writeBuffer = segs[i].action || '';
                    t.value = writeBuffer;
                    chipsRow.innerHTML = `<div class="pp-writing">Editing prompt ${i + 1}: <span class="pp-live"></span></div>`;
                    t.classList.add('pp-hidden-text');
                    t.readOnly = false;
                    t.disabled = false;
                    t.setAttribute('spellcheck', 'false');
                    t.autocorrect = 'off';
                    t.autocapitalize = 'off';
                    requestAnimationFrame(() => {
                        t.focus();
                        t.setSelectionRange(writeBuffer.length, writeBuffer.length);
                    });
                    setTimeout(() => { t.focus(); t.setSelectionRange(writeBuffer.length, writeBuffer.length); }, 100);
                    updateLive();
                };

                chipsRow.addEventListener('click', (e) => {
                    if (adding && e.target.closest('.pp-writing, .pp-live')) {
                        e.preventDefault();
                        e.stopPropagation();
                        setTimeout(() => t.focus(), 0);
                    }
                });

                // -----------------------------
                // HISTORY & STATE
                // -----------------------------
                let history = [];
                let historyIndex = -1;
                const HISTORY_LIMIT = 200;
                let selectAllActive = false; // tracks Ctrl+A selection
                let isComposing = false;     // true during IME composition

                const pushHistory = (force = false) => {
                    const last = history[historyIndex];
                    if (!force && last === writeBuffer) return; // avoid duplicates
                    history = history.slice(0, historyIndex + 1);
                    history.push(writeBuffer);
                    historyIndex++;
                    if (history.length > HISTORY_LIMIT) {
                        history.shift();
                        historyIndex--;
                    }
                };

                const undo = () => {
                    if (historyIndex <= 0) return;
                    historyIndex--;
                    writeBuffer = history[historyIndex];
                    t.value = writeBuffer;
                    updateLive();
                    selectAllActive = false;
                };

                const redo = () => {
                    if (historyIndex >= history.length - 1) return;
                    historyIndex++;
                    writeBuffer = history[historyIndex];
                    t.value = writeBuffer;
                    updateLive();
                    selectAllActive = false;
                };

                const seedHistoryIfNeeded = () => {
                    if (historyIndex === -1) pushHistory(true);
                };

                // -----------------------------
                // Composition (IME) support
                // -----------------------------
                t.addEventListener('compositionstart', () => { isComposing = true; });
                t.addEventListener('compositionend', (ev) => {
                    isComposing = false;
                    // composition finished — update buffer from textarea value & history
                    if (!adding) return;
                    seedHistoryIfNeeded();
                    writeBuffer = t.value;
                    pushHistory();
                    updateLive();
                    selectAllActive = false;
                });

                document.addEventListener('selectionchange', () => {
                    if (!adding) return;
                    if (document.activeElement !== t) return;

                    updateLive();
                });

                // -----------------------------
                // KEYDOWN HANDLER (robust typing)
                // -----------------------------
                t.addEventListener('keydown', e => {
                    if (!adding) return;

                    const key = e.key.toLowerCase();

                    // Allow arrow keys and navigation keys
                    if (
                        key === 'arrowleft' ||
                        key === 'arrowright' ||
                        key === 'arrowup' ||
                        key === 'arrowdown' ||
                        key === 'home' ||
                        key === 'end'
                    ) {
                        e.preventDefault(); // handle caret ourselves

                        // Use the actual input value
                        const value = t.value;
                        let start = t.selectionStart;
                        let end = t.selectionEnd;

                        // collapse selection if exists
                        if (start !== end) {
                            if (key === 'arrowleft' || key === 'arrowup') {
                                end = start;
                            } else {
                                start = end;
                            }
                        }

                        switch (key) {
                            case 'arrowleft':
                                start = end = Math.max(0, start - 1);
                                break;
                            case 'arrowright':
                                start = end = Math.min(value.length, end + 1);
                                break;
                            case 'home':
                                start = end = 0;
                                break;
                            case 'end':
                                start = end = value.length;
                                break;
                            case 'arrowup':
                                start = end = 0; // single-line behavior
                                break;
                            case 'arrowdown':
                                start = end = value.length; // single-line behavior
                                break;
                        }

                        // Apply new caret position
                        t.setSelectionRange(start, end);

                        // Update buffer if you want
                        writeBuffer = value;

                        updateLive();
                        return;
                    }

                    // -----------------------------
                    // Ctrl / Command Shortcuts
                    // -----------------------------
                    if (e.ctrlKey || e.metaKey) {
                        // Undo / Redo
                        if (key === 'z') {
                            e.preventDefault();
                            e.shiftKey ? redo() : undo();
                            return;
                        }
                        if (key === 'y') {
                            e.preventDefault();
                            redo();
                            return;
                        }

                        // Select All
                        if (key === 'a') {
                            e.preventDefault();
                            selectAllActive = true;
                            const live = chipsRow.querySelector('.pp-live');
                            if (live) live.innerHTML = `<span style="background:rgba(255,255,255,0.3);">${esc(writeBuffer)}</span>|`;
                            return;
                        }

                        // Copy
                        if (key === 'c') {
                            e.preventDefault();
                            navigator.clipboard.writeText(writeBuffer).catch(err => console.warn('Copy failed', err));
                            return;
                        }

                        // Paste
                        if (key === 'v') {
                            e.preventDefault();
                            seedHistoryIfNeeded();
                            navigator.clipboard.readText()
                                .then(text => {
                                    if (selectAllActive) {
                                        writeBuffer = text; // overwrite selection
                                        selectAllActive = false;
                                    } else {
                                        writeBuffer += text;
                                    }
                                    t.value = writeBuffer;
                                    pushHistory();
                                    updateLive();
                                })
                                .catch(err => console.warn('Paste failed', err));
                            return;
                        }

                        // Cut
                        if (key === 'x') {
                            e.preventDefault();
                            seedHistoryIfNeeded();
                            navigator.clipboard.writeText(writeBuffer).catch(err => console.warn('Cut failed', err));
                            writeBuffer = '';
                            t.value = writeBuffer;
                            pushHistory();
                            selectAllActive = false;
                            updateLive();
                            return;
                        }

                        // let any other meta combination be handled by browser
                        return;
                    }

                    // If IME composing, don't intercept printable keys (composition handles it)
                    if (isComposing) {
                        return;
                    }

                    // -----------------------------
                    // Backspace / Delete
                    // -----------------------------
                    if (key === 'backspace' || key === 'delete') {
                        e.preventDefault();
                        seedHistoryIfNeeded();

                        let start = t.selectionStart;
                        let end = t.selectionEnd;

                        // If text is selected → delete selection
                        if (start !== end) {
                            writeBuffer =
                                writeBuffer.slice(0, start) +
                                writeBuffer.slice(end);
                        } else if (key === 'backspace' && start > 0) {
                            // delete char before caret
                            writeBuffer =
                                writeBuffer.slice(0, start - 1) +
                                writeBuffer.slice(start);
                            start--;
                        } else if (key === 'delete' && start < writeBuffer.length) {
                            // delete char after caret
                            writeBuffer =
                                writeBuffer.slice(0, start) +
                                writeBuffer.slice(start + 1);
                        }

                        t.value = writeBuffer;
                        t.setSelectionRange(start, start); // 🔥 THIS PREVENTS JUMPING
                        pushHistory();
                        updateLive();
                        selectAllActive = false;
                        return;
                    }

                    // -----------------------------
                    // Other control keys
                    // -----------------------------
                    if (key === 'escape') {
                        e.preventDefault();
                        cancelWrite();
                        return;
                    }

                    if (key === 'enter') {
                        e.preventDefault();
                        finishWrite();
                        return;
                    }

                    // -----------------------------
                    // Printable characters (robust handling)
                    // -----------------------------
                    // key.length === 1 covers letters, numbers, punctuation and space ' '
                    if (key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                        e.preventDefault();
                        seedHistoryIfNeeded();

                        let start = t.selectionStart;
                        let end = t.selectionEnd;
                        const ch = e.key;

                        // Prevent multiple spaces
                        if (ch === ' ') {
                            const prevChar = start > 0 ? writeBuffer[start - 1] : '';
                            const nextChar = writeBuffer[start] || '';

                            // block if space already exists next to caret
                            if (prevChar === ' ' || nextChar === ' ') {
                                return;
                            }
                        }

                        // Replace selection or insert at caret
                        writeBuffer =
                            writeBuffer.slice(0, start) +
                            ch +
                            writeBuffer.slice(end);

                        start++;

                        t.value = writeBuffer;
                        t.setSelectionRange(start, start);
                        pushHistory();
                        updateLive();
                        selectAllActive = false;
                        return;
                    }


                    // For any other key (arrows, home/end), allow default behavior (or add custom handling)
                });

                // -----------------------------
                // INPUT HANDLER (IME or other input events)
                // -----------------------------
                t.addEventListener('input', () => {
                    if (!adding) return;
                    if (isComposing) return;
                    seedHistoryIfNeeded();
                    writeBuffer = t.value;
                    pushHistory();
                    updateLive();
                    selectAllActive = false;
                });

                // -----------------------------
                // BLUR HANDLER
                // -----------------------------
                let isFinishingWrite = false; // Add this variable near your other state variables

                t.addEventListener('blur', (e) => {
                    if (!adding || isFinishingWrite) return;

                    // Delay to check if we're refocusing (like clicking within overlay)
                    setTimeout(() => {
                        // Only finish if we're still not focused and not in middle of finishing
                        if (document.activeElement !== t && !isFinishingWrite) {
                            writeBuffer.trim() ? finishWrite() : cancelWrite();
                        }
                    }, 100);
                });

                document.addEventListener('pointermove', e => {
                    if (activeHandle == null) return;

                    // NEW: if global constraints disallow any adjustments, don't allow dragging
                    if (!adjustmentsAllowed()) return;

                    const r = timeline.getBoundingClientRect();
                    const i = activeHandle;

                    // raw candidate based on cursor
                    let tVal = clamp((e.clientX - r.left) / r.width * V, 0, V);
                    tVal = Math.round(tVal / TIME_STEP) * TIME_STEP;

                    const L = segs[i], R = segs[i + 1];

                    // compute constraints for this handle
                    let min = Math.max(L.start + minPerSegment, R.end - maxSingle);
                    let max = Math.min(L.start + maxSingle, R.end - minPerSegment);

                    // If there is only a single legal value (min >= max), snap and lock the handle.
                    if (min >= max) {
                        const snap = clamp(min, 0, V); // min === max in many constrained cases
                        L.end = R.start = +snap.toFixed(3);
                        renderAll();
                        return;
                    }

                    // otherwise clamp to allowed range
                    tVal = clamp(tVal, min, max);
                    L.end = R.start = +tVal.toFixed(3);
                    renderAll();
                });


                document.addEventListener('pointerup', () => activeHandle = null);

                const updateV = () => {
                    const newV = parseInt(getCheckedCheckboxIdFromCombobox('duration', '5'));;
                    // rescale existing visible segments proportionally only if you prefer proportional scaling.
                    // Current approach: scale positions proportionally to preserve relative positions.
                    const scale = newV / V;
                    segs.forEach(s => {
                        s.start *= scale;
                        s.end *= scale;
                    });

                    // Update global V and other configs
                    V = newV;
                    maxPrompts = V;
                    maxSingle = Math.min(MAX_SINGLE_CAP, V);
                    minPerSegment = Math.min(1, V);

                    // After V changes, visible segments should be re-normalized to obey maxSingle rules
                    normalize();
                    renderAll();
                };

                durationCheckboxes.forEach(c => {
                    c.addEventListener('change', e => {
                        setTimeout(() => {
                            updateV();
                        }, 1);
                    });
                });

                // initial render
                renderAll();
            }

            let previousScreenMode = null;

            async function sizeBasedElements() {
                setMaxWidth();
                const screenMode = getScreenMode();
                const shouldUpdate = previousScreenMode !== screenMode;
                previousScreenMode = screenMode;
                if (!shouldUpdate)
                    return;

                timeStampPrompting();
                loadPageState();
                loadPage();
                revertDefaultSettingsFunc();
                restoreAllScrollPositions({ retries: 10, retryDelay: 200 });
            }

            sizeBasedElements();

            window.addEventListener('resize', sizeBasedElements);
        });
    </script>
</body>
