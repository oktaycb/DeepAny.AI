                                        (cs.display === 'none' || cs.visibility === 'hidden' || parseFloat(cs.opacity) === 0 || n.offsetParent === null || n.offsetHeight === 0 || n.offsetWidth === 0)
                                    );
                                } catch (e) { computedHidden = true; }
                                const entry = { exists, computedHidden };
                                if (type === 'ad') results[key].ad = entry; else results[key].ctrl = entry;
                            });
                            return results;
                        }

                        // ---------- CSS pseudo test (before/after) ----------
                        function testCssPseudo() {
                            try {
                                const styleEl = document.createElement('style');
                                const id = 'adcsspseudo_' + Date.now();
                                styleEl.textContent = `#${id}::before{content:"adtestxyz"!important} #${id}::after{content:"adtestxyz2"!important}`;
                                document.head.appendChild(styleEl);

                                const div = document.createElement('div');
                                div.id = id;
                                div.style.cssText = 'position:fixed;left:-9999px;top:-9999px;height:1px;width:1px;opacity:0;';
                                document.documentElement.appendChild(div);

                                const before = window.getComputedStyle(div, '::before').content || '';
                                const after = window.getComputedStyle(div, '::after').content || '';
                                document.head.removeChild(styleEl);
                                document.documentElement.removeChild(div);

                                const beforeClean = before.replace(/(^")|("$)/g, '');
                                const afterClean = after.replace(/(^")|("$)/g, '');
                                return !(beforeClean === 'adtestxyz' && afterClean === 'adtestxyz2'); // true if tampered/blocked
                            } catch (e) {
                                return true;
                            }
                        }

                        // ---------- network helpers ----------
                        function testScriptLoad(url, timeoutMs) {
                            return new Promise(resolve => {
                                try {
                                    const s = document.createElement('script');
                                    let done = false;
                                    const cleanup = () => { if (s.parentNode) s.parentNode.removeChild(s); };
                                    s.crossOrigin = 'anonymous';
                                    s.src = url;
                                    s.async = true;
                                    s.onload = () => { if (!done) { done = true; cleanup(); resolve({ url, blocked: false }); } };
                                    s.onerror = (e) => { if (!done) { done = true; cleanup(); resolve({ url, blocked: true, error: e }); } };
                                    document.documentElement.appendChild(s);
                                    setTimeout(() => { if (!done) { done = true; cleanup(); resolve({ url, blocked: true, error: 'timeout' }); } }, timeoutMs);
                                } catch (e) { resolve({ url, blocked: true, error: e }); }
                            });
                        }

                        function testImageLoad(url, timeoutMs) {
                            return new Promise(resolve => {
                                try {
                                    const img = new Image();
                                    let done = false;
                                    img.onload = () => { if (!done) { done = true; resolve({ url, blocked: false }); } };
                                    img.onerror = () => { if (!done) { done = true; resolve({ url, blocked: true }); } };
                                    img.src = url + (url.includes('?') ? '&' : '?') + 'adtest=' + Date.now();
                                    setTimeout(() => { if (!done) { done = true; resolve({ url, blocked: true, error: 'timeout' }); } }, timeoutMs);
                                } catch (e) { resolve({ url, blocked: true, error: e }); }
                            });

                        async function testFetch(url, timeoutMs) {
                            try {
                                const controller = new AbortController();
                                const id = setTimeout(() => controller.abort(), timeoutMs);
                                const res = await fetch(url, { method: 'HEAD', cache: 'no-store', signal: controller.signal });
                                clearTimeout(id);
                                return { url, blocked: !(res && res.ok) };
                            } catch (e) {
                                return { url, blocked: true, error: e && e.name === 'AbortError' ? 'timeout' : e };
                            }
                        }

                        function testIframe(url, timeoutMs) {
                            return new Promise(resolve => {
                                try {
                                    const frame = document.createElement('iframe');
                                    frame.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;visibility:hidden;';
                                    let done = false;
                                    const cleanup = () => { if (frame.parentNode) frame.parentNode.removeChild(frame); };
                                    frame.onload = () => { if (!done) { done = true; cleanup(); resolve({ url, blocked: false }); } };
                                    frame.onerror = () => { if (!done) { done = true; cleanup(); resolve({ url, blocked: true }); } };
                                    frame.src = url;
                                    document.documentElement.appendChild(frame);
                                    setTimeout(() => { if (!done) { done = true; cleanup(); resolve({ url, blocked: true, error: 'timeout' }); } }, timeoutMs);
                                } catch (e) { resolve({ url, blocked: true, error: e }); }

                        // ---------- AdSense robust check ----------
                        async function detectAdsenseStatus() {
                            const adSlots = document.querySelectorAll('ins.adsbygoogle');
                            if (!adSlots || adSlots.length === 0) {
                                // no ad slots on this page — do not flag as blocked
                                return { blocked: false, reason: 'no-ad-slots', scriptLoaded: !!window.adsbygoogle, hasPushed: Array.isArray(window.adsbygoogle) && window.adsbygoogle.length > 0, rendered: false };
                            }

                            const deadline = Date.now() + (cfg.adsenseWait || 2000);

                            const checkRendered = () => {
                                return Array.from(adSlots).some(slot => {
                                    // iframe presence is the most reliable sign
                                    if (slot.querySelector && slot.querySelector('iframe')) return true;

                                    // visible size also suggests ad rendered
                                    try {
                                        const cs = window.getComputedStyle(slot);
                                        if (cs && cs.display !== 'none' && cs.visibility !== 'hidden' && slot.clientHeight > 0 && slot.clientWidth > 0) return true;
                                    } catch (e) { }

                                    // innerHTML non-empty (but ignore our own 'adtest' markers)
                                    const inner = (slot.innerHTML || '').trim();
                                    if (inner && !/^adtest/i.test(inner)) return true;

                                    return false;
                                });
                            };

                            while (Date.now() < deadline) {
                                const scriptLoaded = !!window.adsbygoogle;
                                const hasPushed = scriptLoaded && Array.isArray(window.adsbygoogle) && window.adsbygoogle.length > 0;
                                const rendered = checkRendered();

                                if (hasPushed || rendered) {
                                    return { blocked: false, reason: 'ads-loaded', scriptLoaded, hasPushed, rendered };
                                }

                                // small wait
                                await new Promise(r => setTimeout(r, cfg.adsensePollInterval || 150));
                            }

                            // final snapshot after waiting
                            const finalScript = !!window.adsbygoogle;
                            const finalPushed = finalScript && Array.isArray(window.adsbygoogle) && window.adsbygoogle.length > 0;
                            const finalRendered = checkRendered();

                            // Blocked if script missing OR script present but neither pushes nor rendered slots
                            const blocked = (!finalScript) || (finalScript && !finalPushed && !finalRendered);
                            const reason = !finalScript ? 'adsbygoogle script missing after wait' : (!finalPushed && !finalRendered ? 'adsbygoogle loaded but no pushes or rendered slots after wait' : 'adsense ok');

                            return { blocked, reason, scriptLoaded: finalScript, hasPushed: finalPushed, rendered: finalRendered };
                        }

                        // ---------- run checks ----------
                        const report = { checks: { bait: null, adsense: null, cssPseudo: null, script: [], image: [], fetch: [], iframe: [] }, reasons: [] };

                        // baits
                        const wrapper = createPairedBaits();
                        await new Promise(r => setTimeout(r, Math.min(150, cfg.timeout / 4)));
                        report.checks.bait = checkPairedBaits(wrapper);
                        try { wrapper.remove(); } catch (e) { }

                        // adsense (robust)
                        try {
                            const adsenseRes = await detectAdsenseStatus();
                            report.checks.adsense = !!adsenseRes.blocked;
                            if (adsenseRes.blocked) {
                                report.reasons.push(adsenseRes.reason || 'adsense blocked');
                            } else {
                                // optionally push a positive reason for debug
                                // report.reasons.push(adsenseRes.reason || 'adsense ok');
                            }
                        } catch (e) {
                            // In case of unexpected error, mark as not blocked but record reason
                            report.checks.adsense = false;
                            report.reasons.push('adsense-check-error:' + (e && e.message ? e.message : String(e)));
                        }

                        // css pseudo
                        report.checks.cssPseudo = testCssPseudo();
                        if (report.checks.cssPseudo) report.reasons.push('css pseudo tampered');

                        // remote (optional) with retries
                        if (cfg.useRemote) {
                            const runWithRetries = async (fn, url) => {
                                for (let attempt = 0; attempt <= cfg.retries; attempt++) {
                                    const out = await withTimeout(fn(url, cfg.timeout), cfg.timeout + 150, { url, blocked: true, error: 'timeout' });
                                    if (!out || !out.blocked) return out;
                                    if (attempt < cfg.retries) await new Promise(r => setTimeout(r, 150));
                                }
                                return { url, blocked: true };
                            };

                            for (const url of cfg.testScriptUrls) {
                                const r = await runWithRetries(testScriptLoad, url);
                                report.checks.script.push(r); if (r.blocked) report.reasons.push('script blocked: ' + url);
                            }
                            for (const url of cfg.testImageUrls) {
                                const r = await runWithRetries(testImageLoad, url);
                                report.checks.image.push(r); if (r.blocked) report.reasons.push('image blocked: ' + url);
                            }
                            for (const url of cfg.testFetchUrls) {
                                const r = await runWithRetries(testFetch, url);
                                report.checks.fetch.push(r); if (r.blocked) report.reasons.push('fetch blocked: ' + url);
                            }
                            // iframe optional single check
                            const iframeUrl = 'https://pagead2.googlesyndication.com';
                            const rFrame = await runWithRetries(testIframe, iframeUrl);
                            report.checks.iframe.push(rFrame); if (rFrame.blocked) report.reasons.push('iframe blocked: ' + iframeUrl);
                        }

                        // ---------- scoring ----------
                        let totalWeight = 0, positiveWeight = 0;
                        const w = cfg.weights;

                        // bait scoring: only count bait if control visible
                        for (const key in report.checks.bait) {
                            const pair = report.checks.bait[key];
                            const ad = pair.ad || { exists: false, computedHidden: true };
                            const ctrl = pair.ctrl || { exists: false, computedHidden: true };
                            if (ctrl.exists && !ctrl.computedHidden) {
                                totalWeight += w.bait;
                                if (!ad.exists || ad.computedHidden) { positiveWeight += w.bait; report.reasons.push(`bait ${key} hidden while control visible`); }
                            } else {
                                // ambiguous; ignore
                            }
                        }

                        // cssPseudo
                        totalWeight += w.cssPseudo;
                        if (report.checks.cssPseudo) { positiveWeight += w.cssPseudo; }

                        // adsense
                        totalWeight += w.adsense;
                        if (report.checks.adsense) { positiveWeight += w.adsense; }

                        // remote lists
                        ['script', 'image', 'fetch', 'iframe'].forEach(name => {
                            const arr = report.checks[name];
                            if (Array.isArray(arr)) {
                                arr.forEach(it => { totalWeight += w[name] || 1; if (it && it.blocked) { positiveWeight += w[name] || 1; report.reasons.push(`${name} blocked: ${it.url}`); } });
                            }
                        });

                        const confidence = totalWeight ? (positiveWeight / totalWeight) : 0;
                        const blocked = report.checks.adsense || confidence >= cfg.confidenceThreshold;

                        const finalReport = {
                            blocked,
                            confidence,
                            reasons: Array.from(new Set(report.reasons)),
                            checks: report.checks,
                            timestamp: Date.now(),
                            cached: false
                        };

                        return finalReport;
                    }

                        });

                        function effectiveQueue(server) {
                            const key = getGroupKey(server);
                            const groupQ = (groupAggregates[key] || 0);
                            return groupQ;
                        }

                        /*const familyAggregates = {};

                        sortedServerAddresses.forEach((server, i) => {
                            const family = getFamily(server);
                            if (!family) return;

                            if (!familyAggregates[family]) familyAggregates[family] = 0;

                            const family = getFamily(server);
                            const familyTotalQueues = familyAggregates[family] || 0;

                            const fakeQueuePenalty = Math.floor((familyTotalQueues + 1) / 2);

                            if (isRealisticModel && isAnimeServer) adjustedQueue += fakeQueuePenalty;
                            if (isAnimeModel && isRealisticServer) adjustedQueue += fakeQueuePenalty;

                            if (isRealisticModel && isRealisticServer) adjustedQueue -= 0.001;

                        const adjustQueue = (server) => {
                            if (isolatedServers.has(server))
                                return Infinity;

                            const effQ = serverQueueResults[sortedServerAddresses.indexOf(server)] + (effectiveQueue(server) / 2);
                            let adjustedQueue = effQ;

                            const isRealisticModel = model.toLowerCase().includes('realistic');
                            const isAnimeModel = !isRealisticModel;

                            const serverLower = server.toLowerCase();
                            const isRealisticServer = serverLower.includes('1-da');
                            const isAnimeServer = serverLower.includes('2-da');

                            const realisticGroupQ = effectiveQueue(sortedServerAddresses.find(s => s.toLowerCase().includes('1-da')) || '') || 0;
                            const animeGroupQ = effectiveQueue(sortedServerAddresses.find(s => s.toLowerCase().includes('2-da')) || '') || 0;
                            const totalQueues = realisticGroupQ + animeGroupQ;

                            const fakeQueuePenalty = Math.floor((totalQueues + 1) / 2);

                            if (isRealisticModel && isAnimeServer) adjustedQueue += fakeQueuePenalty;
                            if (isAnimeModel && isRealisticServer) adjustedQueue += fakeQueuePenalty;

                            if (isRealisticModel && isRealisticServer) adjustedQueue -= 0.001;
                            if (isAnimeModel && isAnimeServer) adjustedQueue -= 0.001;

                            return adjustedQueue;
                        };

                        const adjustedQueues = sortedServerAddresses.map(server => adjustQueue(server));
                        const minQueueIndex = adjustedQueues.reduce((minIndex, queue, id, arr) =>
                            queue < arr[minIndex] ? id : minIndex,
                            0
                        );

                        if (adjustedQueues[minQueueIndex] === Infinity) {
                            setClientStatus("Offline");
                            showNotification(
                                `Cannot fetch the server. A VPN could cause this or our server is currently offline. Contact an admin for more information.`,
                                "Warning - Process Failed",
                                "warning-important"
                            );
                            handleProcessBtn.disabled = false;
                            return;
                        }

                        const userName = userId.replace(/[^a-zA-Z0-9_]/g, '');
                        const fileOutputId = `${Math.random().toString(36).substring(2, 15)}_${userName}_${neededCredits}_${1}`;

                        setFetchableServerAdresses([sortedServerAddresses[minQueueIndex]]);
                        const serverAddress = getFetchableServerAdresses()[0]; // "https://RTL-5-3090-1-DA.deepany.top";
                        setFetchableServerAdresses([serverAddress]);
                        setClientStatus(`Connecting`);
                        showNotification(`Connecting to ${serverAddress}...`, "Process - Information", "information");

                        const adaptiveGuidance = document.getElementById('adaptiveGuidance').checked;
                        const adaptiveThreshold = document.querySelector('#adaptiveThreshold input[type="range"]').value;
                        const serverUrl = new URL(serverAddress);
                        const onlineStatus = localStorage.getItem(`onlineStatus_${serverUrl.origin}`);
                        function parseRandomPrompt(prompt) {
                            return prompt.replace(/\{([^}]+)\}/g, (_, group) => {
                                const options = group.split('|');
                                return options[Math.floor(Math.random() * options.length)];
                            });
                        }
                        const positivePromptTextarea = document.getElementById("positivePrompt");
                        const negativePromptTextarea = document.getElementById("negativePrompt");
                        const positivePromptRaw = positivePromptTextarea.value;
                        const negativePromptRaw = negativePromptTextarea.value;
                        const positivePrompt = parseRandomPrompt(positivePromptRaw);
                        const negativePrompt = parseRandomPrompt(negativePromptRaw);
                        const aspectRatio15 = getCheckedCheckboxIdFromCombobox('aspectRatio15', '1:1');
                        const aspectRatioXL = getCheckedCheckboxIdFromCombobox('aspectRatioXL', '1:1');
                        const batch = getCheckedCheckboxIdFromCombobox('batch', '1');
                        const seed = document.querySelector('#seed input[type="range"]').value;
                        const rescaleCFG = document.getElementById('rescaleCFG').checked;
                        const rescaleMultiplier = document.querySelector('#rescaleMultiplier input[type="range"]').value;
                        const skimmedCFG = document.getElementById('skimmedCFG').checked;
                        const skimmingCFG = document.querySelector('#skimmingCFG input[type="range"]').value;
                        const automaticCFG = document.getElementById('automaticCFG').checked;
                        const fp16 = document.getElementById('fp16').checked;
                        const vpred = document.getElementById("vpred").checked;
                        const tensorrt = document.getElementById("tensorrt").checked;
                        const sag = document.getElementById('sag').checked;
                        const faceDetailer = document.getElementById('faceDetailer').checked;
                        const enableSAG = document.getElementById('enableSAG').checked;
                        const enablePAG = document.getElementById('enablePAG').checked;
                        const enableFDG = document.getElementById('enableFDG').checked;
                        const enableAPG = document.getElementById('enableAPG').checked;
                        const enableSEG = document.getElementById('enableSEG').checked;
                        const znsr = document.getElementById('znsr').checked;
                        const nag = document.getElementById('nag').checked;
                        const instantid = document.getElementById('instantid').checked;
                        const cache = getCheckedCheckboxIdFromCombobox('cache', 'conservative');
                        const cacheStart = document.querySelector('#cacheStart input[type="range"]').value;
                        const cfg = document.querySelector('#cfg input[type="range"]').value;
                        const clipSkip = document.querySelector('#clipSkip input[type="range"]').value;
                        const epsilon = document.querySelector('#epsilon input[type="range"]').value;
                        const uncondZeroScale = document.querySelector('#uncondZeroScale input[type="range"]').value;
                        const sampler = getCheckedCheckboxIdFromCombobox('sampler', 'euler');
                        const scheduler = getCheckedCheckboxIdFromCombobox('scheduler', 'normal');
                        const noise = getCheckedCheckboxIdFromCombobox('noise', 'A1111');
                        const uncondMethod = getCheckedCheckboxIdFromCombobox('uncondMethod', 'uncond_zero_v3');
                        const steps = document.querySelector('#steps input[type="range"]').value;
                        const s_lora = getCheckedCheckboxIdFromCombobox('s_lora', 'disabled');
                        const s_strength = document.querySelector('#s_strength input[type="range"]').value;
                        const lora = getCheckedCheckboxIdFromCombobox('lora', 'disabled');
                        const strength = document.querySelector('#strength input[type="range"]').value;
                        setRandomSeed();

                        const formData = new FormData();
                        formData.append('userId', userId);
                        formData.append('og', localStorage.getItem('og') || false);
                        formData.append('portraitFile', portraitFile);
                        formData.append('onlineStatus', onlineStatus);
                        formData.append('removeBanner', removeBanner.checked);
                        formData.append('seed', seed);
                        formData.append('adaptiveGuidance', adaptiveGuidance);
                        formData.append('adaptiveThreshold', adaptiveThreshold);
                        formData.append('rescaleCFG', rescaleCFG);
                        formData.append('rescaleMultiplier', rescaleMultiplier);
                        formData.append('skimmedCFG', skimmedCFG);
                        formData.append('skimmingCFG', skimmingCFG);
                        formData.append('automaticCFG', automaticCFG);
                        formData.append('aspectRatio', model.includes("1.5") ? aspectRatio15 : aspectRatioXL);
                        formData.append('batch', batch);
                        formData.append('resolution', model.includes("1.5") ? '512p' : '720p');
                        formData.append('fp16', fp16);
                        formData.append('sag', sag);
                        formData.append('faceDetailer', faceDetailer);
                        formData.append('znsr', znsr);
                        formData.append('instantid', instantid);
                        formData.append('epsilon', epsilon);
                        formData.append('uncondZeroScale', uncondZeroScale);
                        formData.append('vpred', vpred);
                        formData.append('tensorrt', tensorrt);
                        formData.append('nag', nag);
                        formData.append('enableSAG', enableSAG);
                        formData.append('enablePAG', enablePAG);
                        formData.append('enableFREEU', enableFREEU);
                        formData.append('enableFDG', enableFDG);
                        formData.append('enableAPG', enableAPG);
                        formData.append('enableSEG', enableSEG);
                        formData.append('cache', cache);
                        formData.append('cacheStart', cacheStart);
                        formData.append('cfg', cfg);
                        formData.append('clipSkip', clipSkip);
                        formData.append('sampler', sampler);
                        formData.append('scheduler', scheduler);
                        formData.append('noise', noise);
                        formData.append('uncondMethod', uncondMethod);
                        formData.append('steps', steps);
                        formData.append('s_lora', s_lora);
                        formData.append('s_strength', s_strength);
                        formData.append('lora', lora);
                        formData.append('strength', strength);
                        formData.append('model', model);
                        formData.append('positivePrompt', positivePrompt);
                        formData.append('negativePrompt', negativePrompt);
                        formData.append('fileOutputId', fileOutputId);

                        showNotification(`Sending your configuration to the server...`, 'Upload', 'information');
                        setClientStatus('Configurating...');

                        const response = await fetchWithRandom(`${serverAddress}/start-process`, {
                            method: 'POST',
                            body: formData
                        });

                        if (response.status !== STATUS_OK) {
                            const data = await response.json();
                            console.error(data.server);
                            throw new Error(data.server);
                        }

                        const result = await response.json();
                        showNotification(`Creating output database using IndexedDB...`, 'Database - IndexedDB', 'information');

                        const db = await openDB(`outputDB-${pageName}`, 'outputs');
                        const url = serverAddress + '/download-output/' + fileOutputId;
                        const firstChild = outputs.firstChild;

                        if (firstChild && !firstChild.dataset.created) {
                            firstChild.dataset.created = true;
                            firstChild.innerHTML = `<div class="process-text">Indexing</div>`;

                            function formDataToObject(formData) {
                                const obj = {};
                                const excludeKeys = new Set([
                                    'userId',
                                    'userInternetProtocolAddress',
                                    'userUniqueBrowserId',
                                    'userUniqueInternetProtocolId',
                                    'fileOutputId',
                                    'onlineStatus',
                                    'portraitFile',
                                ]);

                                formData.append('portraitFileName', portraitFileName);

                                for (const [key, value] of formData.entries()) {
                                    if (!(value instanceof File) && !excludeKeys.has(key)) {
                                        obj[key] = value;
                                    }
                                }
                                return obj;
                            }

                            const formDataObject = formDataToObject(formData);
                            localStorage.setItem(`${url}_formData`, JSON.stringify(formDataObject));

                            await addToDB(db, [null, url], false);
                            await saveCountIndex(databases);

                            const data = await getFromDB(db);
                            const entry = data.find(item => item.url && item.url.toLowerCase() === url.toLowerCase());
                            firstChild.innerHTML = `<initial url="${entry.url}" id="${entry.id}" timestamp="${entry.timestamp}" processing></initial><div class="process-text">Indexing</div><div class="delete-icon"></div>`;
                        }

                        showNotification(`Starting the process...`, 'Upload', 'information');
                        setClientStatus('Starting...');
                        updateDownloadFile(true, databases, userId);
                        return result;
                    } catch (error) {
                        console.error(error.message);
                        handleProcessBtn.disabled = false;
                        setClientStatus(error.message);
                        cancelProcess(false);
                    }
                }

                if (handleProcessBtn)
                    handleProcessBtn.addEventListener('click', async () => {
                        await handleProcess();
                    });

                const downloadOutput = document.getElementById('downloadOutput');
                if (downloadOutput) {
                    const activeDataContainer = document.querySelector(".outputs .data-container.active");
                    if (!activeDataContainer) {
                        downloadOutput.disabled = true;
                        //showNotification(`Maintaince for IOS downloads (Not important if you are not IOS).`, 'Warning - Download', 'warning');
                    }

                    downloadOutput.addEventListener('click', async () => {
                        const activeDataContainer = document.querySelector(".outputs .data-container.active");
                        if (!activeDataContainer) {
                            showNotification(`No active output container selected.`, 'Warning - Download', 'warning');
                            return;
                        }

                        const activeInput = activeDataContainer?.querySelector('[original="true"]');
                        if (!activeInput) {
                            showNotification(`No active input element found.`, 'Warning - Download', 'warning');
                            return;
                        }

                        if (downloadOutput.textContent === "Pause") {
                            const abortController = getAbortController();
                            if (abortController) {
                                abortController.abort();
                                resetAbortController();
                                setDownloadCancelled(true);
                                showNotification(`Download paused successfully.`, 'Download - Paused', 'info');
                            } else {
                                showNotification(`No active download to pause.`, 'Warning - Pause', 'warning');
                            }

                            downloadOutput.textContent = "Resume";
                            downloadOutput.classList.add("important");
                            return;
                        }

                        if (downloadOutput.textContent === "Resume") {
                            const selectedOutputInfo = {
                                db: await openDB(`outputDB-${pageName}`, 'outputs'),
                                url: activeInput.getAttribute('url'),
                                timestamp: parseInt(activeInput.getAttribute('timestamp')),
                                element: activeInput.parentElement,
                                id: parseInt(activeInput.getAttribute('id')),
                                active: activeInput.getAttribute('active'),
                            };

                            showNotification(`Resuming download for output ID: ${selectedOutputInfo.id}.`, 'Download - Resuming', 'info');
                            return await handleDownload(selectedOutputInfo);
                        }

                        if (activeInput) {
                            const id = activeInput.getAttribute('id');
                            const fileName = 'output_' + `${id}.${activeInput.tagName === 'VIDEO' ? 'mp4' : 'png'}`;

                            const domIndex = parseInt(activeInput.getAttribute('id'));
                            const db = await openDB(`outputDB-${pageName}`, 'outputs');
                            const items = await getFromDB(db);
                            const item = items.find(item => item.id === domIndex);
                            if (!item || !item.blob) {
                                throw new Error(`No blob found for ID: ${domIndex}`);
                            }

                            let type = '';
                            if (activeInput) {
                                if (activeInput.tagName === 'IMG') {
                                    type = 'image/png';
                                } else if (activeInput.tagName === 'VIDEO') {
                                    type = 'image/mp4';
                                } else {
                                    showNotification('Error: Unsupported element type for download.', 'Error - Download', 'error');
                                    return;
                                }
                            }
                            let methodUsed = 0;
                            try {
                                if (window.showSaveFilePicker) {
                                    methodUsed = 1;
                                    showNotification('Attempting to use showSaveFilePicker...', 'Download - Info', 'info');

                                    const fileHandle = await window.showSaveFilePicker({
                                        suggestedName: fileName,
                                        types: [
                                            { description: 'Video Files', accept: { 'image/mp4': ['.mp4'], 'image/webm': ['.webm'] } },
                                            { description: 'Image Files', accept: { 'image/png': ['.png'], 'image/jpeg': ['.jpg'] } },
                                        ],
                                    });

                                    const writableStream = await fileHandle.createWritable();
                                    await writableStream.write(item.blob);
                                    await writableStream.close();
                                    showNotification(`File saved successfully: ${fileName}`, 'Download - Success', 'success');
                                } else if (navigator.share) {
                                    methodUsed = 2;
                                    showNotification('Attempting to use navigator.share...', 'Download - Info', 'info');

                                    const fileToShare = new File([item.blob], fileName, { type });
                                    await navigator.share({ title: fileName, files: [fileToShare] });
                                    showNotification(`File shared successfully: ${fileName}`, 'Download - Shared', 'success');
                                } else {
                                    methodUsed = 3;
                                    showNotification('Attempting to use <a> tag for download...', 'Download - Info', 'info');

                                    const objectURL = URL.createObjectURL(item.blob);
                                    const a = document.createElement('a');
                                    a.href = objectURL;
                                    a.download = fileName;
                                    document.body.appendChild(a);
                                    a.click();
                                    document.body.removeChild(a);
                                    URL.revokeObjectURL(objectURL);
                                    showNotification(`File downloaded successfully: ${fileName}`, 'Download - Success', 'success');
                                }
                            } catch (error) {
                                if (error.name === 'AbortError') {
                                    showNotification(`Download was aborted for: ${fileName}`, 'Error - Aborted', 'error');
                                    return;
                                }

                                showNotification(`First method failed (Error: ${error.message} - Method: ${methodUsed}), retrying in 1000ms for file: ${fileName}...`, 'Error - Download', 'error');
                                setTimeout(() => {
                                    const objectURL = URL.createObjectURL(item.blob);
                                    const a = document.createElement('a');
                                    a.href = objectURL;
                                    a.download = fileName;

                                    if (!iosMobileCheck()) {  // Only execute this on non-iOS devices
                                        try {
                                            document.body.appendChild(a);
                                            a.click();
                                            document.body.removeChild(a);
                                            URL.revokeObjectURL(objectURL);
                                            showNotification(`File downloaded successfully: ${fileName}`, 'Download - Success', 'success');
                                        } catch (error) {
                                            showNotification(`Failed to download the file (Error: ${error.message})`, 'Error - Download', 'error');
                                        }
                                    } else {
                                        showNotification(`Skipping download method for iOS devices: ${fileName}`, 'Download - Info', 'info');
                                        try {
                                            const newTab = window.open(objectURL, '_blank');
                                            if (!newTab) {
                                                showNotification(`Failed to open the file in a new tab for: ${fileName}`, 'Error - Open Tab', 'error');
                                            } else {
                                                setTimeout(() => {
                                                    URL.revokeObjectURL(objectURL);
                                                }, 1000);
                                            }
                                        } catch (tabError) {
                                            showNotification(`Failed to open in a new tab (Error: ${tabError.message})`, 'Error - Tab Open', 'error');
                                        }
                                    }
                                }, 1000);
                            }
                        } else {
                            showNotification(`No output is selected.`, 'Warning - Download', 'warning');
                        }
                    });
                }

                const viewOutput = document.getElementById('viewOutput');
                if (viewOutput) {
                    const activeDataContainer = document.querySelector(".outputs .data-container.active");
                    if (!activeDataContainer) viewOutput.disabled = true;

                    viewOutput.addEventListener('click', async () => {
                        const activeDataContainer = document.querySelector(".outputs .data-container.active");
                        const activeInput = activeDataContainer?.querySelector('[original="true"]');

                        if (activeInput) {
                            if (viewOutput.textContent === 'Fetch') {
                                const abortController = getAbortController();
                                if (abortController) {
                                    abortController.abort();
                                    resetAbortController();
                                    downloadOutput.textContent = "Resume";
                                    setDownloadCancelled(true);
                                }

                                return window.open(activeInput.getAttribute('url'), '_blank');
                            }

                            if (activeInput.tagName === 'INITIAL') {
                                alert('Initial element cannot be viewed.');
                                return;
                            }

                            const existingWrapper = document.getElementById('wrapper');
                            if (existingWrapper) return;

                            const wrapper = document.createElement('div');
                            wrapper.id = 'wrapper';

                            const backgroundContainer = document.createElement('div');
                            backgroundContainer.className = 'background-container';

                            const backgroundDotContainer = document.createElement('a');
                            backgroundDotContainer.className = 'background-dot-container';

                            const backgroundDotContent = document.createElement('div');
                            backgroundDotContent.className = 'background-dot-container-content';
                            backgroundDotContent.style.padding = '0';

                            const innerContainer = document.createElement('div');
                            innerContainer.className = 'background-container';
                            innerContainer.style.display = 'contents';
                            innerContainer.id = 'innerContainer';

                            let mediaElement;

                            if (activeInput.tagName === 'VIDEO') {
                                mediaElement = document.createElement('image');
                                mediaElement.controls = true;
                                mediaElement.loop = true;
                                mediaElement.src = activeInput.querySelector('source')?.src ? activeInput.querySelector('source')?.src : activeInput?.src;
                                mediaElement.style.maxWidth = '100vw';
                                mediaElement.style.maxHeight = '94vh';
                                mediaElement.style.borderRadius = 'var(--border-radius)';
                                mediaElement.style.objectFit = 'cover';
                            } else if (activeInput.tagName === 'IMG') {
                                mediaElement = document.createElement('img');
                                mediaElement.src = activeInput.src;
                                mediaElement.style.maxWidth = '100vw';
                                mediaElement.style.maxHeight = '94vh';
                                mediaElement.style.borderRadius = 'var(--border-radius)';
                                mediaElement.style.objectFit = 'cover';
                            }

                            if (!mediaElement.src) {
                                wrapper.remove();
                                alert('Media source not found.');
                                return;
                            }

                            // Close Button
                            const closeButton = document.createElement('button');
                            closeButton.className = 'close-button';
                            closeButton.style.position = 'absolute';
                            closeButton.style.top = '1vh';
                            closeButton.style.right = '1vh';
                            closeButton.style.cursor = 'pointer';
                            closeButton.style.width = '4vh';
                            closeButton.style.height = '4vh';
                            closeButton.style.padding = '0';
                            closeButton.style.margin = '0';

                            const closeButtonIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                            closeButtonIcon.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
                            closeButtonIcon.setAttribute('viewBox', '0 0 24 24');
                            closeButtonIcon.setAttribute('fill', 'none');
                            closeButtonIcon.setAttribute('stroke', 'currentColor');
                            closeButtonIcon.setAttribute('stroke-width', '2');
                            closeButtonIcon.setAttribute('stroke-linecap', 'round');
                            closeButtonIcon.setAttribute('stroke-linejoin', 'round');
                            closeButtonIcon.style.margin = '0';
                            closeButtonIcon.style.width = 'calc((3.5vh * var(--scale-factor-h)))';
                            closeButtonIcon.classList.add('lucide', 'lucide-x');

                            const path1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            path1.setAttribute('d', 'M18 6 6 18');
                            const path2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                            path2.setAttribute('d', 'm6 6 12 12');

                            closeButtonIcon.appendChild(path1);
                            closeButtonIcon.appendChild(path2);

                            closeButton.appendChild(closeButtonIcon);
                            closeButton.addEventListener('click', () => {
                                wrapper.remove();
                            });

                            const reportButton = document.createElement('button');
                            reportButton.className = 'report-button';
                            reportButton.style.position = 'absolute';
                            reportButton.style.bottom = '1vh';
                            reportButton.style.right = '1vh';

                            reportButton.innerHTML = 'Report Content';
                            reportButton.addEventListener('click', () => {
                                showNotification(
                                    `Thank you for reporting inappropriate content. Our moderation team will review the report and take appropriate action.`,
                                    'Reported Content',
                                    'warning-important'
                                );
                                wrapper.remove();
                                const deleteIconParent = activeDataContainer.querySelector('.delete-icon');
                                if (deleteIconParent) {
                                    deleteIconParent.click();
                                }
                            });

                            innerContainer.appendChild(mediaElement);
                            innerContainer.appendChild(closeButton);
                            //innerContainer.appendChild(reportButton);

                            backgroundDotContent.appendChild(innerContainer);
                            backgroundDotContainer.appendChild(backgroundDotContent);
                            backgroundContainer.appendChild(backgroundDotContainer);
                            wrapper.appendChild(backgroundContainer);
                            document.body.appendChild(wrapper);
                        }
                    });
                }

                if (getScreenMode() !== ScreenMode.PC) {
                    const baseContainer = document.getElementById('baseContainer');
                    if (baseContainer)
                        baseContainer.style.gridTemplateColumns = '';
                }
            }

            let previousScreenMode = null;

            async function sizeBasedElements() {
                setMaxWidth();
                const screenMode = getScreenMode();
                const shouldUpdate = previousScreenMode !== screenMode;
                previousScreenMode = screenMode;
                if (!shouldUpdate)
                    return;

                loadPageState(true);
                loadPage();
                loadPageState(false);
            }

            sizeBasedElements();

            window.addEventListener('resize', sizeBasedElements);
        });
    </script>
