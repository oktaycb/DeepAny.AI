<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Forgot Password | Tensomar</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tensomar" />
    <link rel="apple-touch-icon" href="/assets/images/tensomar-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1152d4" />
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Navigation Header -->
            <header
                class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 md:px-10 py-4">
                <a class="flex items-center gap-3 nav-logo-link transition-opacity hover:opacity-80" href="#">
                    <div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
                        <img class="w-6 h-6 object-contain" data-alt="Tensomar corporate logo" loading="lazy"
                            src="/assets/images/tensomar-logo.png" />
                    </div>
                    <h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">Tensomar
                    </h2>
                </a>
                <div class="flex items-center gap-2">
                    <button
                        class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
                        <span class="material-symbols-outlined">shield_lock</span>
                    </button>
                </div>
            </header>
            <!-- Main Content Area: Centered Card Layout -->
            <main class="flex-1 flex items-center justify-center p-4 md:p-8">
                <div class="w-full max-w-[480px] flex flex-col gap-8">
                    <!-- Hero Image / Visual Element -->
                    <div
                        class="group relative overflow-hidden rounded-xl bg-slate-200 dark:bg-slate-800 aspect-[16/7] flex items-center justify-center">
                        <div class="absolute inset-0 bg-gradient-to-tr from-primary/20 to-transparent"></div>
                        <div class="relative z-10 flex flex-col items-center gap-2">
                            <span
                                class="material-symbols-outlined text-primary text-5xl opacity-80">key_visualizer</span>
                        </div>
                        <div class="absolute inset-0 opacity-30 bg-[url('https://placeholder.pics/svg/600')] bg-cover bg-center mix-blend-overlay"
                            data-alt="Abstract geometric blue tech pattern background"></div>
                    </div>
                    <!-- Reset Password Card -->
                    <div
                        class="bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 p-8 rounded-xl shadow-xl">
                        <div class="flex flex-col gap-2 mb-8 text-center">
                            <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900 dark:text-white">
                                Forgot Password</h1>
                            <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                                No worries, it happens. Please enter the email address associated with your account.
                            </p>
                        </div>
                        <form id="forgot-password-form" action="#" class="flex flex-col gap-6" method="POST">
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1"
                                    for="email">Email Address</label>
                                <div class="relative flex items-center">
                                    <span
                                        class="material-symbols-outlined absolute left-4 text-slate-400 text-[20px]">mail</span>
                                    <input
                                        class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg py-3.5 pl-12 pr-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all"
                                        id="email" name="email" placeholder="name@company.com" required=""
                                        type="email" />
                                </div>
                            </div>
                            <button id="reset-btn"
                                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group"
                                type="submit">
                                <span id="reset-btn-text">Send Reset Link</span>
                                <span
                                    class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
                            </button>
                            <!-- Status Message -->
                            <div id="status-message" class="text-sm text-center hidden"></div>
                        </form>
                        <div class="mt-8 flex flex-col items-center gap-4">
                            <div class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
                                <span class="w-8 h-px bg-slate-200 dark:bg-slate-800"></span>
                                <span>Secured by Tensomar Auth</span>
                                <span class="w-8 h-px bg-slate-200 dark:bg-slate-800"></span>
                            </div>
                            <a class="text-primary hover:text-primary/80 text-sm font-medium flex items-center gap-1 transition-colors"
                                href="/auth/sign-in">
                                <span class="material-symbols-outlined text-[18px]">keyboard_backspace</span>
                                Back to login
                            </a>
                        </div>
                    </div>
                    <!-- Footer Info -->
                    <footer class="text-center">
                        <p class="text-xs text-slate-500 dark:text-slate-500 uppercase tracking-widest font-semibold">
                            © 2024 Tensomar Systems. All rights reserved.
                        </p>
                    </footer>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { resetPassword, getUserDoc, setupLogoRouting } from '../scripts/functions.js?v=6';

        setupLogoRouting();

        document.addEventListener('DOMContentLoaded', async () => {
            if (await getUserDoc()) {
                window.location.href = '/dashboard/panel';
                return;
            }

            const form = document.getElementById('forgot-password-form');
            const emailInput = document.getElementById('email');
            const statusMsg = document.getElementById('status-message');
            const submitBtn = document.getElementById('reset-btn');
            const submitBtnText = document.getElementById('reset-btn-text');

            const showStatus = (msg, isError = false) => {
                statusMsg.textContent = msg;
                statusMsg.className = `text-sm text-center ${isError ? 'text-red-500' : 'text-green-500'}`;
                statusMsg.classList.remove('hidden');
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                statusMsg.classList.add('hidden');

                const email = emailInput.value.trim();
                if (!email) {
                    showStatus("Please enter your email", true);
                    return;
                }

                try {
                    submitBtn.disabled = true;
                    submitBtnText.textContent = "Sending...";

                    await resetPassword(email);

                    showStatus("Reset link sent! Please check your inbox.");
                    emailInput.value = "";
                } catch (error) {
                    let friendlyError = "Failed to send reset link.";
                    if (error.code === 'auth/user-not-found') friendlyError = "No account found with that email.";
                    showStatus(friendlyError, true);
                } finally {
                    submitBtn.disabled = false;
                    submitBtnText.textContent = "Send Reset Link";
                }
            });
        });
    </script>
</body>

</html>
